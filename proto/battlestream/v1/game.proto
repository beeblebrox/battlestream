syntax = "proto3";

package battlestream.v1;

option go_package = "battlestream.fixates.io/internal/api/grpc/gen;bspb";

message PlayerStats {
  string name = 1;
  string hero_card_id = 2;
  int32 health = 3;
  int32 armor = 4;
  int32 tavern_tier = 5;
  int32 spell_power = 6;
  int32 triple_count = 7;
  int32 win_streak = 8;
  int32 placement = 9;
  int32 loss_streak = 10;
  int32 max_health = 11;
  int32 damage = 12;
}

message MinionState {
  int32 entity_id = 1;
  string card_id = 2;
  string name = 3;
  int32 attack = 4;
  int32 health = 5;
  string minion_type = 6;
  int32 buff_attack = 7;
  int32 buff_health = 8;
  repeated Enchantment enchantments = 9;
}

message Enchantment {
  int32 entity_id = 1;
  string card_id = 2;
  string source_card_id = 3;
  string source_name = 4;
  int32 target_id = 5;
  int32 attack_buff = 6;
  int32 health_buff = 7;
  string category = 8;
  reserved 9;
}

message AbilityCounter {
  string category = 1;
  int32 value = 2;
  string display = 3;
}

message BuffSource {
  string category = 1;
  int32 attack = 2;
  int32 health = 3;
}

message StatMod {
  int32 turn = 1;
  string target = 2;
  string stat = 3;
  int32 delta = 4;
  string source = 5;
  string category = 6;
  string card_id = 7;
}

message GameState {
  string game_id = 1;
  string phase = 2;
  int32 turn = 3;
  int32 tavern_tier = 4;
  PlayerStats player = 5;
  PlayerStats opponent = 6;
  repeated MinionState board = 7;
  repeated MinionState opponent_board = 8;
  repeated StatMod modifications = 9;
  int64 start_time_unix = 10;
  int64 end_time_unix = 11;
  int32 placement = 12;
  repeated BuffSource buff_sources = 13;
  repeated Enchantment enchantments = 14;
  repeated AbilityCounter ability_counters = 15;
  repeated string available_tribes = 16;
  bool is_duos = 17;
  PlayerStats partner = 18;
  repeated MinionState partner_board = 19;
  repeated BuffSource partner_buff_sources = 20;
  repeated AbilityCounter partner_ability_counters = 21;
}

message GameEvent {
  string type = 1;
  int64 timestamp_unix = 2;
  int32 entity_id = 3;
  map<string, string> tags = 4;
  string entity_name = 5;
  string card_id = 6;
}
