name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.claude/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.claude/**'
      - 'docs/**'
  workflow_call:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          args: --timeout=5m

  proto-check:
    name: Proto — generated files up to date
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@latest

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone googleapis (google/api only)
        run: |
          git clone --depth=1 --filter=blob:none --sparse \
            https://github.com/googleapis/googleapis ~/googleapis
          cd ~/googleapis && git sparse-checkout set google/api

      - name: Regenerate protos
        run: |
          GWMOD="$(go env GOPATH)/pkg/mod/$(go list -m -f '{{.Path}}@{{.Version}}' github.com/grpc-ecosystem/grpc-gateway/v2)"
          OUT=internal/api/grpc/gen
          protoc \
            -I proto \
            -I ~/googleapis \
            -I "$GWMOD" \
            --go_out="$OUT" --go_opt=paths=source_relative \
            --go-grpc_out="$OUT" --go-grpc_opt=paths=source_relative \
            --grpc-gateway_out="$OUT" --grpc-gateway_opt=paths=source_relative \
            battlestream/v1/game.proto \
            battlestream/v1/stats.proto \
            battlestream/v1/service.proto

      - name: Check for diff
        run: |
          if ! git diff --exit-code internal/api/grpc/gen/; then
            echo "::error::Generated proto files are out of date. Run scripts/gen-proto.sh and commit the result."
            exit 1
          fi

  proto-breaking:
    name: Proto — breaking change check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1

      - name: Check proto backward compatibility
        uses: bufbuild/buf-breaking-action@v1
        with:
          input: proto
          against: "https://github.com/${{ github.repository }}.git#branch=main,subdir=proto"

  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: battlestream:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
