version: 2

project_name: battlestream

before:
  hooks:
    - go mod tidy

builds:
  - id: battlestream
    main: ./cmd/battlestream
    binary: battlestream
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    hooks:
      post:
        - cmd: scripts/sign-windows.sh {{ .Path }} {{ .Os }}
          output: true

universal_binaries:
  - id: battlestream-universal
    ids:
      - battlestream
    name_template: battlestream
    replace: false

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
      {{- if eq .Arch "all" }}_universal{{ end }}

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    artifacts: checksum
    output: true

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - Merge pull request

release:
  github:
    owner: beeblebrox
    name: battlestream
  prerelease: auto

brews:
  - repository:
      owner: beeblebrox
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/beeblebrox/battlestream
    description: Hearthstone Battlegrounds stat tracker
    license: MIT
    install: |
      bin.install "battlestream"
    test: |
      system "#{bin}/battlestream", "version"

scoops:
  - repository:
      owner: beeblebrox
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    homepage: https://github.com/beeblebrox/battlestream
    description: Hearthstone Battlegrounds stat tracker
    license: MIT
